version: '3.8'

services:
  trmnl-loop:
    build: .
    container_name: trmnl-loop
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      # URL to your TRMNL BYOS instance (REQUIRED - e.g. http://192.168.1.100:4567)
      - TRMNL_BYOS_URL=${TRMNL_BYOS_URL}
      # How often (in seconds) the display should rotate between cached screens (default 300)
      - CYCLE_INTERVAL=${CYCLE_INTERVAL:-300}
